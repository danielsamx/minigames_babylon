<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámaras 3D - Babylon.js</title>
    <meta name="description"
        content="Cinco mini-juegos 3D interactivos que demuestran los distintos tipos de cámara en Babylon.js.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Babylon.js CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

    <style>
        /* ─── Reset ─── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --panel-bg:    rgba(16, 16, 24, 0.95);
            --panel-border: rgba(255, 255, 255, 0.08);
            --panel-shadow: 0 8px 32px rgba(0,0,0,0.55);
            --blur: blur(20px);
            --radius: 14px;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #e2e8f0;
            --accent2: #f97316;
            --font-ui: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --sidebar-width: 290px;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: var(--font-body);
            color: var(--text-primary);
        }

        /* ─── Main Layout: scene + sidebar side by side ─── */
        #app-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #scene-area {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        /* ─── Canvas ─── */
        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }

        /* ─── UI container (overlays on top of canvas) ─── */
        #ui-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .interactive { pointer-events: auto; }

        /* ════════════════════════════════════════
           TOP NAV BAR
        ════════════════════════════════════════ */
        #camera-selector-wrapper {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            background: rgba(12, 12, 20, 0.8);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--panel-border);
            border-radius: 50px;
            padding: 4px;
            box-shadow: var(--panel-shadow);
            pointer-events: auto;
        }

        .camera-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 7px 18px;
            border-radius: 50px;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.22s ease;
            white-space: nowrap;
        }

        .camera-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.06);
        }

        .camera-btn.active {
            background: rgba(255,255,255,0.12);
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
        }

        /* ════════════════════════════════════════
           SIDEBAR
        ════════════════════════════════════════ */
        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 20;
        }

        /* Scrollbar styling */
        #sidebar::-webkit-scrollbar {
            width: 4px;
        }
        #sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        /* ─── Sidebar: Info Section ─── */
        #info-panel {
            padding: 20px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid var(--panel-border);
        }

        .info-label {
            font-family: var(--font-ui);
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--accent2);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .info-label::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent2);
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--accent2);
        }

        #camera-title {
            font-family: var(--font-ui);
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .info-desc {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        /* Controls list */
        .controls-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 4px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.15s ease;
        }

        .control-item:hover {
            background: rgba(255,255,255,0.06);
        }

        .key-badge {
            background: rgba(255,255,255,0.1);
            color: #cbd5e1;
            padding: 2px 7px;
            border-radius: 4px;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.68rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ─── Sidebar: Stats Section ─── */
        #stats-panel {
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .stats-title {
            font-family: var(--font-ui);
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .stat-label {
            font-size: 0.76rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .stat-value {
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--text-primary);
            transition: transform 0.12s ease, color 0.12s ease;
        }

        .stat-value.pop {
            transform: scale(1.2);
            color: var(--accent2);
        }

        /* ─── Controls inside stats ─── */
        .stat-control-btn {
            flex: 1;
            padding: 6px 0;
            font-size: 0.7rem;
            font-family: var(--font-ui);
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.18s ease;
        }
        .stat-control-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.15);
        }

        .stat-select {
            width: 100%;
            border-radius: 8px;
            padding: 7px 10px;
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.08);
            font-family: var(--font-body);
            font-size: 0.76rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s ease;
        }
        .stat-select:focus {
            border-color: rgba(255,255,255,0.2);
        }

        .stat-select option {
            background: #1e293b;
        }

        .stat-slider {
            width: 100%;
            -webkit-appearance: none;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.12);
            outline: none;
            accent-color: var(--accent2);
        }

        .speedometer-container {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .speedometer-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #f97316, #ef4444);
            border-radius: 2px;
            transition: width 0.2s ease;
            width: 0%;
        }

        /* ════════════════════════════════════════
           CROSSHAIR / SHOOT (DeviceOrientation)
        ════════════════════════════════════════ */
        #action-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: none;
        }

        .crosshair {
            width: 22px;
            height: 22px;
            border: 1.5px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            position: relative;
        }

        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.7);
        }

        .crosshair::before {
            top: 9px; left: -10px;
            width: 42px; height: 1px;
        }

        .crosshair::after {
            left: 9px; top: -10px;
            width: 1px; height: 42px;
        }

        .shoot-btn {
            pointer-events: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: var(--blur);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.15);
            width: 76px;
            height: 76px;
            border-radius: 50%;
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: 0.72rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s ease;
        }

        .shoot-btn:hover  { background: rgba(255,255,255,0.18); }
        .shoot-btn:active { transform: scale(0.92); }

        /* ════════════════════════════════════════
           LOADER
        ════════════════════════════════════════ */
        #loader {
            position: fixed;
            inset: 0;
            background: #080808;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .loader-wordmark {
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: 1rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            border-top-color: rgba(255,255,255,0.5);
            animation: spin 0.9s linear infinite;
        }

        .loader-text {
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ════════════════════════════════════════
           VICTORY / GAME OVER OVERLAYS
        ════════════════════════════════════════ */
        #victory-overlay, #gameover-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .victory-card, .gameover-card {
            background: rgba(15,15,20,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 44px 52px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 360px;
        }

        .victory-card h2 {
            font-family: var(--font-ui);
            font-size: 2rem;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .gameover-card h2 {
            font-family: var(--font-ui);
            font-size: 2rem;
            font-weight: 800;
            color: #f87171;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .victory-card p, .gameover-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .victory-score-display, .gameover-score-display {
            font-family: var(--font-ui);
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin: 8px 0 6px;
        }

        .victory-record, .gameover-record {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            letter-spacing: 0.3px;
        }

        .overlay-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 0.8rem;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.12);
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .action-btn:hover { transform: translateY(-1px); opacity: 0.9; }

        .btn-green  { background: rgba(74,222,128,0.15); color: #4ade80; }
        .btn-red    { background: rgba(248,113,113,0.15); color: #f87171; }
        .btn-orange { background: rgba(249,115,22,0.15);  color: #fb923c; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── Popup flotante ─── */
        #popup-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .floating-comic-text {
            position: absolute;
            font-family: var(--font-ui);
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.5);
            animation: floatUp 0.75s ease forwards;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            20%  { opacity: 1; transform: translate(-50%, -60%) scale(1.05); }
            80%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        /* ─── Confetti ─── */
        .confetti {
            position: absolute;
            width: 6px; height: 10px;
            opacity: 0.85;
            z-index: 110;
            pointer-events: none;
            animation: fall 2.5s linear forwards;
        }

        @keyframes fall {
            from { transform: translateY(-20px) rotate(0deg); opacity: 0.85; }
            to   { transform: translateY(100vh)  rotate(480deg); opacity: 0; }
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 100%;
            }

            #app-layout {
                flex-direction: column;
            }

            #scene-area {
                flex: 1;
            }

            #sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 40vh;
                border-left: none;
                border-top: 1px solid var(--panel-border);
            }

            #camera-selector-wrapper {
                top: auto;
                bottom: 42vh;
                left: 50%;
                transform: translateX(-50%);
                overflow-x: auto;
                max-width: calc(100vw - 24px);
            }
        }
    </style>
</head>

<body>
    <!-- Pantalla de Carga -->
    <div id="loader">
        <div class="loader-wordmark">Babylon.js</div>
        <div class="spinner"></div>
        <div class="loader-text">Iniciando motor 3D</div>
    </div>

    <!-- Layout principal: escena + sidebar -->
    <div id="app-layout">

        <!-- Zona de la escena (canvas + overlays) -->
        <div id="scene-area">
            <canvas id="renderCanvas"></canvas>

            <!-- Contenedor UI (overlays flotantes sobre el canvas) -->
            <div id="ui-container">

                <!-- Selector de escenas (Top Center) -->
                <div id="camera-selector-wrapper" class="interactive">
                    <button class="camera-btn active" id="btn-scene-arcRotate" data-camera="arcRotate">Orbita Cosmica</button>
                    <button class="camera-btn" id="btn-scene-free" data-camera="free">Galeria Prohibida</button>
                    <button class="camera-btn" id="btn-scene-follow" data-camera="follow">Piloto de Estrellas</button>
                    <button class="camera-btn" id="btn-scene-anaglyph" data-camera="anaglyph">Laberinto del Tiempo</button>
                    <button class="camera-btn" id="btn-scene-deviceOrientation" data-camera="deviceOrientation">Cazador de Asteroides</button>
                </div>

                <!-- Mira (DeviceOrientation) -->
                <div id="action-overlay">
                    <div class="crosshair"></div>
                    <button class="shoot-btn interactive" id="btn-shoot">FUEGO</button>
                </div>

            </div>
        </div>

        <!-- Barra lateral -->
        <div id="sidebar" class="interactive">
            <!-- Instrucciones -->
            <div id="info-panel">
                <div class="info-label">Cámara activa<span id="camera-icon"></span></div>
                <div id="camera-title">Órbita Cósmica</div>
                <p class="info-desc" id="camera-desc">
                    Orbita el sistema solar. Haz clic en los planetas para visitarlos.
                </p>
                <div class="controls-list" id="camera-controls"></div>
            </div>

            <!-- Estadísticas -->
            <div id="stats-panel">
                <div class="stats-title">Estadísticas</div>
                <div id="scene-stats"></div>
            </div>
        </div>

    </div>

    <!-- Popups flotantes -->
    <div id="popup-overlay"></div>

    <!-- Overlay de Victoria -->
    <div id="victory-overlay" style="display:none; flex-direction:column;">
        <div class="victory-card">
            <h2 id="victory-title">VICTORIA</h2>
            <p id="victory-message">Objetivo completado</p>
            <div class="victory-score-display" id="victory-score">0 pts</div>
            <div class="victory-record" id="victory-record"></div>
            <div class="overlay-actions">
                <button class="action-btn btn-orange interactive" id="btn-victory-replay">Jugar de nuevo</button>
                <button class="action-btn btn-green interactive" id="btn-victory-close">Continuar</button>
            </div>
        </div>
    </div>

    <!-- Overlay de Game Over -->
    <div id="gameover-overlay" style="display:none; flex-direction:column;">
        <div class="gameover-card">
            <h2 id="gameover-title">GAME OVER</h2>
            <p id="gameover-message">Se acabo el tiempo.</p>
            <div class="gameover-score-display" id="gameover-score">0 pts</div>
            <div class="gameover-record" id="gameover-record"></div>
            <div class="overlay-actions">
                <button class="action-btn btn-red interactive" id="btn-gameover-retry">Reintentar</button>
                <button class="action-btn btn-orange interactive" id="btn-gameover-close">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Script principal -->
    <script type="module" src="./src/main.js"></script>
</body>

</html>
